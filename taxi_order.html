<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>聚合平台报价</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/taxi_order.css">
</head>

<body>

    <div class="app">

        <!-- 顶部 -->
        <div class="header">
            <div class="back" onclick="history.back()">
                ←
            </div>
            <div class="title">
                聚合平台报价
            </div>
            <div style="width:40px;"></div>
        </div>

        <!-- 起终点 -->
        <div class="card">
            <div class="location-row">
                <span class="start-dot"></span>
                <span>深圳湾科技生态园</span>
            </div>
            <div class="location-line"></div>
            <div class="location-row">
                <span class="end-dot"></span>
                <span>深圳北站</span>
            </div>
        </div>

        <!-- 行程信息 -->
        <div class="card">
            <div class="trip-info">
                <span>现在出发</span>
                <span>经济型</span>
                <span>帮人叫车</span>
            </div>
        </div>

        <!-- 标题 -->
        <div class="quote-title">
            已获取4个平台实时报价
            <span>更新时间：刚刚</span>
        </div>

        <!-- 推荐平台 -->
        <div class="platform-card recommend">
            <div class="recommend-tag">
                推荐
            </div>
            <div class="platform-left">
                <div class="platform-name">
                    滴滴快车
                </div>
                <div class="platform-desc">
                    ★★★★★　4分钟到达
                </div>
            </div>
            <div class="platform-right">
                <div class="old-price">
                    ￥31
                </div>
                <div class="coupon">
                    券后 ￥23
                </div>
                <button>
                    选择
                </button>
            </div>
        </div>

        <!-- 曹操 -->
        <div class="platform-card">
            <div class="platform-left">
                <div class="platform-name">
                    曹操出行
                </div>
                <div class="platform-desc">
                    ★★★★★　5分钟到达
                </div>
            </div>
            <div class="platform-right">
                <div class="price">
                    ￥32
                </div>
                <button>
                    选择
                </button>
            </div>
        </div>

        <!-- T3 -->
        <div class="platform-card">
            <div class="platform-left">
                <div class="platform-name">
                    T3出行
                </div>
                <div class="platform-desc">
                    ★★★★☆　4分钟到达
                </div>
            </div>
            <div class="platform-right">
                <div class="price">
                    ￥33
                </div>
                <button>
                    选择
                </button>
            </div>
        </div>

        <!-- 首汽 -->
        <div class="platform-card">
            <div class="platform-left">
                <div class="platform-name">
                    首汽约车
                </div>
                <div class="platform-desc">
                    ★★★★★　6分钟到达
                </div>
            </div>
            <div class="platform-right">
                <div class="price">
                    ￥35
                </div>
                <button>
                    选择
                </button>
            </div>
        </div>

        <!-- 更多 -->
        <div class="more-platform">
            查看更多平台报价（6） ▼
        </div>

        <!-- 费用说明 -->
        <div class="card">
            <div class="section-title">
                费用说明
            </div>
            <p class="tips">
                • 报价由合作平台实时返回，仅供参考。<br>
                • 实际价格可能因路况、天气等因素有所变化。<br>
                • 约电出行提供聚合比价及订单撮合服务。
            </p>
        </div>

        <!-- 合规 -->
        <div class="compliance-box">
            <div class="compliance-links">
                <a href="user_agreement.html">用户协议</a>
                <span>|</span>
                <a href="privacy.html">隐私政策</a>
            </div>
            <div class="compliance-links">
                <a href="travel_rules.html">法律条款与平台规则</a>
                <span>|</span>
                <a href="travel_license.html">证照信息</a>
            </div>
        </div>
        <div style="height:90px;"></div>

    </div>

    <div class="bottom-action">
        <button class="call-btn">
            立即呼叫车辆
        </button>
    </div>

    <script src="js/taxi_order.js"></script>

</body>

</html>
