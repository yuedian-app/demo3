<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>证照信息</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/license.css">
</head>

<body>

    <div class="app">

        <!-- 顶部 -->
        <div class="header">
            <div class="back" onclick="history.back()">
                ←
            </div>
            <div class="title">
                证照信息
            </div>
            <div style="width:40px;"></div>
        </div>

        <!-- 页面说明 -->
        <div class="license-notice">
            <div class="notice-title">
                合作平台资质展示
            </div>
            <div class="notice-text">
                为保障用户合法权益，约电出行合作平台均应依法取得相应经营资质。
                以下展示合作出行平台营业执照（示意）。
            </div>
        </div>

        <!-- 滴滴 -->
        <div class="license-card">
            <div class="platform-name">
                滴滴出行
            </div>
            <img src="img/licenses/travel/didi.jpg" class="license-image" alt="滴滴营业执照">
            <div class="view-tip">
                点击图片查看大图
            </div>
        </div>

        <!-- 曹操 -->
        <div class="license-card">
            <div class="platform-name">
                曹操出行
            </div>
            <img src="img/licenses/travel/caocao.jpg" class="license-image" alt="曹操营业执照">
            <div class="view-tip">
                点击图片查看大图
            </div>
        </div>

        <!-- T3 -->
        <div class="license-card">
            <div class="platform-name">
                T3出行
            </div>
            <img src="img/licenses/travel/t3.jpg" class="license-image" alt="T3营业执照">
            <div class="view-tip">
                点击图片查看大图
            </div>
        </div>

        <!-- 首汽 -->
        <div class="license-card">
            <div class="platform-name">
                首汽约车
            </div>
            <img src="img/licenses/travel/shouqi.jpg" class="license-image" alt="首汽营业执照">
            <div class="view-tip">
                点击图片查看大图
            </div>
        </div>

        <!-- 哈啰 -->
        <div class="license-card">
            <div class="platform-name">
                哈啰顺风车
            </div>
            <img src="img/licenses/travel/hello.jpg" class="license-image" alt="哈啰营业执照">
            <div class="view-tip">
                点击图片查看大图
            </div>
        </div>

    </div>

    <script src="js/license.js"></script>

</body>

</html>
