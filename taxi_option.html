<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>网约车设置</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/taxi_option.css">
</head>

<body>

    <div class="app">

        <!-- 顶部 -->
        <div class="header">
            <div class="back" onclick="history.back()">
                ←
            </div>
            <div class="title">
                网约车设置
            </div>
            <div style="width:40px;"></div>
        </div>

        <!-- 起终点 -->
        <div class="card">
            <div class="location-row">
                <div class="dot start"></div>
                <div class="address">
                    深圳湾科技生态园
                </div>
            </div>
            <div class="line"></div>
            <div class="location-row">
                <div class="dot end"></div>
                <div class="address">
                    深圳北站
                </div>
            </div>
        </div>

        <!-- 出发时间 -->
        <div class="card">
            <div class="section-title">
                出发时间
            </div>
            <div class="option-item">
                <div>
                    现在出发
                </div>
                <div class="arrow">
                    >
                </div>
            </div>
        </div>

        <!-- 服务需求 -->
        <div class="card">
            <div class="section-title">
                服务需求
            </div>
            <div class="service-grid">
                <div class="service-item active" onclick="toggleItem(this)">
                    帮人叫车
                </div>
                <div class="service-item" onclick="toggleItem(this)">
                    接机
                </div>
                <div class="service-item" onclick="toggleItem(this)">
                    送机
                </div>
            </div>
        </div>

        <!-- 帮人叫车 -->
        <div class="card" id="otherPassenger">
            <div class="section-title">
                乘车人信息
            </div>
            <input class="input" type="text" placeholder="请输入乘车人姓名">
            <input class="input" type="tel" placeholder="请输入联系电话">
        </div>

        <!-- 接送机 -->
        <div class="card" id="flightInfo" style="display:none;">
            <div class="section-title">
                航班信息
            </div>
            <input class="input" placeholder="请输入航班号">
            <input class="input" placeholder="预计到达时间">
        </div>

        <!-- 备注 -->
        <div class="card">
            <div class="section-title">
                备注
            </div>
            <textarea class="remark" placeholder="如有特殊需求可填写（选填）"></textarea>
        </div>

        <!-- 预计费用 -->
        <div class="card">
            <div class="price-row">
                <span>预计车型</span>
                <span>经济型</span>
            </div>
            <div class="price-row">
                <span>预计价格</span>
                <span class="price">
                    ￥31~35
                </span>
            </div>
        </div>

        <!-- 底部按钮 -->
        <div class="bottom-bar">
            <button class="submit-btn" onclick="location.href='taxi_order.html'">
                获取平台报价
            </button>
        </div>

    </div>

    <script src="js/taxi_option.js"></script>

</body>

</html>
