<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>网约车设置</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/taxi_option.css">
</head>

<body>

    <div class="app page">

        <!-- 顶部 -->
        <div class="header">
            <div class="back" onclick="history.back()">←</div>
            <div class="title">网约车设置</div>
            <div style="width:40px;"></div>
        </div>

        <!-- 起终点 -->
        <div class="option-card">
            <div class="address-row">
                <span class="address-dot start-dot"></span>
                深圳科技园
            </div>
            <div class="address-line"></div>
            <div class="address-row">
                <span class="address-dot end-dot"></span>
                深圳北站
            </div>
        </div>

        <!-- 出发方式 -->
        <div class="option-card">
            <div class="option-title">出发方式</div>
            <div class="radio-group" id="departType">
                <div class="radio-item active" data-type="now">
                    立即出发
                </div>
                <div class="radio-item" data-type="reserve">
                    预约出发
                </div>
            </div>
            <div id="reserveBox" class="reserve-box hidden">
                <div class="select-row">
                    <span>预约时间</span>
                    <span>2026-07-09 14:30 ></span>
                </div>
            </div>
        </div>

        <!-- 车型 -->
        <div class="option-card">
            <div class="option-title">
                车型选择
            </div>
            <div class="radio-group">
                <div class="radio-item active">
                    经济型
                </div>
                <div class="radio-item">
                    优享型
                </div>
                <div class="radio-item">
                    商务型
                </div>
            </div>
        </div>

        <!-- 人数 -->
        <div class="option-card">
            <div class="option-title">
                乘车人数
            </div>
            <div class="radio-group">
                <div class="radio-item active">
                    1人
                </div>
                <div class="radio-item">
                    2人
                </div>
                <div class="radio-item">
                    3人
                </div>
                <div class="radio-item">
                    4人+
                </div>
            </div>
        </div>

        <!-- 更多服务 -->
        <div class="option-card">
            <div class="option-title">
                更多服务
            </div>
            <div class="service-item">
                <span>帮人叫车</span>
                <input type="checkbox">
            </div>
            <div class="service-item">
                <span>接机</span>
                <input type="checkbox">
            </div>
            <div class="service-item">
                <span>送机</span>
                <input type="checkbox">
            </div>
        </div>

        <!-- 备注 -->
        <div class="option-card">
            <div class="option-title">
                备注信息
            </div>
            <textarea placeholder="请输入司机备注（选填）"></textarea>
        </div>

        <!-- 费用 -->
        <div class="option-card">
            <div class="price-box">
                <span>
                    预估费用
                </span>
                <div class="price-value">
                    ￥31
                </div>
            </div>
        </div>

        <button class="submit-btn">
            获取平台报价
        </button>

    </div>

    <script src="js/taxi_option.js"></script>

</body>

</html>
