<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>证照信息</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/license.css">
</head>

<body>

    <div class="app">

        <!-- 顶部 -->
        <div class="header">
            <div class="back" onclick="history.back()">
                ←
            </div>
            <div class="title">
                证照信息
            </div>
            <div style="width:40px;"></div>
        </div>

        <!-- 页面说明 -->
        <div class="license-notice">
            <div class="notice-title">
                合作补能平台资质展示
            </div>
            <div class="notice-text">
                为保障用户合法权益，约电出行移动补能服务及合作充电运营商均应依法取得相应经营资质。
                以下展示相关营业执照，仅用于平台资质公示。
            </div>
        </div>

        <!-- 约电移动补能 -->
        <div class="license-card">
            <div class="platform-name">
                <div class="company-name">
                    约电移动补能
                </div>
            </div>
            <img src="img/licenses/energy/yuedian.jpg" class="license-image" alt="约电移动补能营业执照">
            <div class="view-tip">
                点击图片查看大图
            </div>
        </div>

        <!-- 特来电 -->
        <div class="license-card">
            <div class="platform-name">
                <div class="company-name">
                    特来电
                </div>
            </div>
            <img src="img/licenses/energy/telaidian.jpg" class="license-image" alt="特来电营业执照">
            <div class="view-tip">
                点击图片查看大图
            </div>
        </div>

        <!-- 星星充电 -->
        <div class="license-card">
            <div class="platform-name">
                <div class="company-name">
                    星星充电
                </div>
            </div>
            <img src="img/licenses/energy/xingxing.jpg" class="license-image" alt="星星充电营业执照">
            <div class="view-tip">
                点击图片查看大图
            </div>
        </div>

        <!-- 云快充 -->
        <div class="license-card">
            <div class="platform-name">
                <div class="company-name">
                    云快充
                </div>
            </div>
            <img src="img/licenses/energy/yunkuai.jpg" class="license-image" alt="云快充营业执照">
            <div class="view-tip">
                点击图片查看大图
            </div>
        </div>

        <!-- 南方电网 -->
        <div class="license-card">
            <div class="platform-name">
                <div class="company-name">
                    南方电网充电
                </div>
            </div>
            <img src="img/licenses/energy/csg.jpg" class="license-image" alt="南方电网充电营业执照">
            <div class="view-tip">
                点击图片查看大图
            </div>
        </div>

        <!-- 国家电网 -->
        <div class="license-card">
            <div class="platform-name">
                <div class="company-name">
                    国家电网智慧车联网
                </div>
            </div>
            <img src="img/licenses/energy/sgcc.jpg" class="license-image" alt="国家电网智慧车联网营业执照">
            <div class="view-tip">
                点击图片查看大图
            </div>
        </div>

    </div>

    <script src="js/license.js"></script>

</html>
