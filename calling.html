<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>智能匹配车辆</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/calling.css">
</head>

<body>

    <div class="app">

        <!-- 顶部 -->
        <div class="header">
            <div class="back" onclick="history.back()">
                ←
            </div>
            <div class="title">
                智能匹配车辆
            </div>
            <div style="width:40px;"></div>
        </div>

        <!-- 动画 -->
        <div class="calling-card">
            <div class="loading-circle">
                🚖
            </div>
            <div class="calling-title">
                正在为您智能匹配车辆...
            </div>
            <div class="calling-desc">
                已向多个合作平台同步发送订单
            </div>
        </div>

        <!-- 平台 -->
        <div class="card">
            <div class="section-title">
                已发送平台
            </div>
            <div class="platform">
                ✔ 滴滴出行
            </div>
            <div class="platform">
                ✔ 曹操出行
            </div>
            <div class="platform">
                ✔ T3出行
            </div>
            <div class="platform">
                ✔ 首汽约车
            </div>
        </div>

        <!-- 倒计时 -->
        <div class="card">
            <div class="section-title">
                智能调度中
            </div>
            <div class="countdown">
                预计剩余
                <span id="count">
                    8
                </span>
                秒
            </div>
        </div>

        <!-- 匹配规则 -->
        <div class="card">
            <div class="section-title">
                平台将优先为您选择
            </div>
            <div class="rule">
                ✔ 最近车辆
            </div>
            <div class="rule">
                ✔ 最优惠价格
            </div>
            <div class="rule">
                ✔ 最快到达
            </div>
            <div class="rule">
                ✔ 服务评分最高
            </div>
        </div>

        <!-- 底部 -->
        <div class="bottom-box">
            <button class="cancel-btn">
                取消订单
            </button>
            <button class="service-btn">
                联系客服
            </button>
        </div>

    </div>

    <script src="js/calling.js"></script>

</body>

</html>
