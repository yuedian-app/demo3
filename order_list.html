<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>我的订单</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/order_list.css">
</head>

<body>

    <div class="app">

        <!-- 顶部 -->
        <div class="header">
            <div class="back" onclick="history.back()">
                ←
            </div>
            <div class="title">
                我的订单
            </div>
            <div style="width:40px;"></div>
        </div>

        <!-- 一级分类 -->
        <div class="main-tabs">
            <div class="main-tab active">
                全部
            </div>
            <div class="main-tab">
                出行
            </div>
            <div class="main-tab">
                补能
            </div>
        </div>

        <!-- 状态 -->
        <div class="status-tabs">
            <div class="status active">
                全部
            </div>
            <div class="status">
                进行中
            </div>
            <div class="status">
                已完成
            </div>
            <div class="status">
                已取消
            </div>
        </div>

        <!-- 订单1 -->
        <div class="order-card" onclick="location.href='order_detail.html'">
            <div class="order-header">
                <span>
                    🚖 聚合网约车
                </span>
                <span class="finish">
                    已完成
                </span>
            </div>
            <div class="route">
                深圳湾科技生态园
                <span>
                    →
                </span>
                深圳北站
            </div>
            <div class="order-info">
                <span>
                    滴滴出行
                </span>
                <span>
                    ￥23
                </span>
            </div>
            <div class="vehicle">
                比亚迪 秦PLUS EV · 粤B·A12345
            </div>
            <div class="detail">
                查看详情 >
            </div>
        </div>

        <!-- 订单2 -->
        <div class="order-card" onclick="location.href='order_detail.html'">
            <div class="order-header">
                <span>
                    🚘 聚合顺风车
                </span>
                <span class="finish">
                    已完成
                </span>
            </div>
            <div class="route">
                南山科技园
                <span>
                    →
                </span>
                深圳机场
            </div>
            <div class="order-info">
                <span>
                    哈啰顺风车
                </span>
                <span>
                    ￥18
                </span>
            </div>
            <div class="vehicle">
                王师傅 · 新能源车辆
            </div>
            <div class="detail">
                查看详情 >
            </div>
        </div>

        <!-- 订单3 -->
        <div class="order-card" onclick="location.href='energy_rescue_detail.html'">
            <div class="order-header">
                <span>
                    🔋 移动补能
                </span>
                <span class="processing">
                    进行中
                </span>
            </div>
            <div class="route">
                车辆搭电救援
            </div>
            <div class="order-info">
                <span>
                    约电移动补能
                </span>
                <span>
                    ￥120
                </span>
            </div>
            <div class="vehicle">
                等待补能车到达
            </div>
            <div class="detail">
                查看详情 >
            </div>
        </div>

        <!-- 订单4 -->
        <div class="order-card">
            <div class="order-header">
                <span>
                    ⚡ 聚合充电
                </span>
                <span class="finish">
                    已完成
                </span>
            </div>
            <div class="route">
                深圳南山合作充电站
            </div>
            <div class="order-info">
                <span>
                    充电订单
                </span>
                <span>
                    ￥45
                </span>
            </div>
            <div class="vehicle">
                约电合作优惠价
            </div>
            <div class="detail">
                查看详情 >
            </div>
        </div>
        <div style="height:100px;"></div>

    </div>

    <script src="js/order_list.js"></script>

</body>

</html>
