<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>行程完成</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/trip_finish.css">
</head>

<body>

    <div class="app">

        <!-- 顶部 -->
        <div class="header">
            <div class="back" onclick="history.back()">
                ←
            </div>
            <div class="title">
                行程完成
            </div>
            <div style="width:40px;"></div>
        </div>

        <!-- 完成状态 -->
        <div class="finish-card">
            <div class="finish-icon">
                ✓
            </div>
            <div class="finish-title">
                出行完成
            </div>
            <div class="finish-desc">
                感谢使用约电出行
            </div>
        </div>

        <!-- 订单信息 -->
        <div class="card">
            <div class="section-title">
                订单信息
            </div>
            <div class="info-row">
                <span>
                    服务平台
                </span>
                <span>
                    滴滴出行
                </span>
            </div>
            <div class="info-row">
                <span>
                    车辆
                </span>
                <span>
                    比亚迪 秦PLUS EV
                </span>
            </div>
            <div class="info-row">
                <span>
                    车牌
                </span>
                <span>
                    粤B·A12345
                </span>
            </div>
            <div class="info-row">
                <span>
                    行程时间
                </span>
                <span>
                    18:32 - 19:05
                </span>
            </div>
        </div>

        <!-- 费用 -->
        <div class="card">
            <div class="section-title">
                费用明细
            </div>
            <div class="price-row">
                <span>
                    实际支付
                </span>
                <span class="price">
                    ￥23
                </span>
            </div>
            <div class="info-row">
                <span>
                    平台优惠
                </span>
                <span class="discount">
                    -￥8
                </span>
            </div>
        </div>

        <!-- 新能源 -->
        <div class="card energy-card">
            <div class="section-title">
                新能源出行
            </div>
            <div class="energy-content">
                🔋 本次使用新能源车辆
            </div>
            <div class="carbon">
                预计减少碳排放
                <strong>
                    0.8kg
                </strong>
            </div>
        </div>

        <!-- 评价 -->
        <div class="card">
            <div class="section-title">
                服务评价
            </div>
            <div class="stars" onclick="rate()">
                ☆ ☆ ☆ ☆ ☆
            </div>
            <textarea class="remark" placeholder="留下您的宝贵建议（选填）">
        </textarea>
        </div>

        <!-- 平台合规 -->
        <div class="compliance-box">
            <div class="compliance-links">
                <a href="user_agreement.html">
                    《用户协议》
                </a>
                <span>|</span>
                <a href="privacy.html">
                    《隐私政策》
                </a>
            </div>
            <div class="compliance-links">
                <a href="travel_rules.html">
                    《法律条款与平台规则》
                </a>
                <span>|</span>
                <a href="travel_license.html">
                    《证照信息》
                </a>
            </div>
            <div class="compliance-desc">
                约电出行作为聚合出行服务平台，仅提供信息聚合、交易撮合及相关技术服务；网约车及顺风车服务均由具有合法经营资质的第三方合作平台提供。
            </div>
        </div>

        <!-- 底部 -->
        <div class="trip-bottom">
            <button class="viewOrder-btn">
                查看订单
            </button>
            <button class="travelAgain-btn">
                再次出行
            </button>
        </div>

    </div>

    <script src="js/trip_finish.js"></script>

</body>

</html>
